<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>mravlja</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        touch-action: manipulation;
        -webkit-user-select: none !important;
        user-select: none !important;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: royalblue;
      }

      h1 {
        position: absolute;
        font-family: 'Georgia', serif;
        font-style: italic;
        color: rgb(255, 50, 70, 0.8);
      }

      canvas {
        border-radius: 50%;
      }

      .circle {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: lightblue;
        position: fixed;
        bottom: 0;
        right: 0;
        margin: 20px;
        cursor: pointer;
      }

      /* to make the hover area larger */
      .circle:after {
        position: absolute;
        content: '';
        top: -30px;
        right: -30px;
        bottom: -30px;
        left: -30px;
      }

      .circle.active {
        background: lightpink;
      }
    </style>
  </head>
  <body>
    <div class="circle"></div>
    <script src="../p5.min.js"></script>
    <script type="module" src="js/sketch.js"></script>
  </body>
</html>
