<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- prettier-ignore -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mravlja" />
    <meta property="og:url" content="https://www.vodnibivol.org/mravlja/" />
    <meta property="og:image" content="https://www.vodnibivol.org/mravlja/og-mravlja.png" />
    <meta property="og:description" content="Nahrani mravljo.." />

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>mravlja</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        touch-action: manipulation;
        -webkit-user-select: none !important;
        user-select: none !important;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: royalblue;
        /* for preload text "Loading..." */
        color: ivory;
        font-family: 'Consolas', monospace;
        font-size: 12px;
        font-weight: bold;
      }

      canvas {
        border-radius: 50%;
      }

      .circle {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: lightblue;
        position: fixed;
        bottom: 0;
        right: 0;
        margin: 20px;
        cursor: pointer;
      }

      /* to make the hover area larger */
      .circle:after {
        position: absolute;
        content: '';
        top: -30px;
        right: -30px;
        bottom: -30px;
        left: -30px;
      }

      .circle.active {
        background: lightpink;
      }
    </style>
  </head>
  <body>
    <div class="circle"></div>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
    <script type="module" src="js/sketch.js"></script>
  </body>
</html>
